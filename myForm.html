<!DOCTYPE html>
<html>
    <header>
        <title>ISMS 121 My Form </title>
        <link rel="stylesheet" href="mystyle.css" type="text/css" />
    </header>
    <body>
        <main>
            <h1>Signup Form</h1>
            <section id="defaultForm" class="form">
                <h2>Please complete all the fields</h2>
                <form id="signup">
                    <fieldset> <legend>Login Credentials</legend>
                        <label for ="username">Username:</label>
                        <input type="text" id="username" required name="username" placeholder="What is your username?"><br>
                        <label for ="Place">place:</label>
                        <input type="text" id="Place" required name="place" placeholder="Where are you from?"><br>
                        <label for ="Date of birth">Date of birth:</label>
                        <input type="text" id="Date of birth" required name="Date of birth" placeholder="Date of birth?"><br>
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" placeholder="Please enter your password"><br>
                    </fieldset>
                    <button>Submit</button>
                </form>
            </section>
        </main>
    </body>
</html>
